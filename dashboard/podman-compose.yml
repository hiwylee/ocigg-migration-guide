version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./db:/app/db:Z
      - ../scripts:/app/scripts:ro,Z
      - ../plan:/app/plan:ro,Z
      - ../docs:/app/docs:ro,Z
    restart: unless-stopped
    networks:
      - dashboard

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dashboard

networks:
  dashboard:
    driver: bridge
